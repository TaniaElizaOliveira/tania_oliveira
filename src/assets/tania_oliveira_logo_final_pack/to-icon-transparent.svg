<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset=".45" stop-color="#bfc1c8"/>
      <stop offset="1" stop-color="#f7f7f8"/>
    </linearGradient>
    <filter id="purpleGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feFlood flood-color="#8b2cff" flood-opacity=".85"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>
  <g fill="none" filter="url(#purpleGlow)">
    <circle cx="256" cy="256" r="176" stroke="#8b2cff" stroke-width="18" opacity=".85"/>
  </g>
  <circle cx="256" cy="256" r="176" fill="none" stroke="url(#silver)" stroke-width="24" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="#fff" stroke-width="3" opacity=".65"/>
  <path d="M143 164h226v41h-91v158h-44V205h-91z" fill="url(#silver)" filter="url(#shadow)"/>
  <path d="M143 164h226v41h-91v158h-44V205h-91z" fill="none" stroke="#fff" stroke-width="2" opacity=".6"/>
</svg>